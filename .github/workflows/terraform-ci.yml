name: Terraform CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: fmt / init / validate / plan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Terraform fmt
        working-directory: ${{ github.workspace }}
        run: terraform fmt --check -recursive

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        run: |
          set -o pipefail
          terraform plan -var-file=envs/dev/dev.tfvars -no-color -input=false 2>&1 | tee plan.txt

      - name: Post plan as PR comment
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          PLAN_FILE: infra/plan.txt
        with:
          script: |
            const fs = require('fs');
            const path = process.env.PLAN_FILE;
            let plan = '';
            try {
              plan = fs.readFileSync(path, 'utf8');
            } catch (e) {
              plan = `Could not read plan output (${e.message}).`;
            }
            const max = 60000;
            if (plan.length > max) {
              plan = plan.slice(0, max) + '\n\n... (truncated)';
            }
            const body = [
              '### Terraform Plan',
              '',
              `Status: \`${{ steps.plan.outcome }}\``,
              '',
              '<details><summary>Show plan</summary>',
              '',
              '```hcl',
              plan,
              '```',
              '',
              '</details>'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
